name: Deploy to App Runner

# Trigger: push vào nhánh main
on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-southeast-1          # ← đổi thành region của bạn
  ECR_REPOSITORY: dexter              # ← phải trùng với tên ECR repo bạn tạo
  APPRUNNER_SERVICE_ARN: ${{ secrets.APPRUNNER_SERVICE_ARN }}  # ARN của App Runner service

jobs:
  # ── Job 1: Build & Push Docker image lên ECR ──────────────
  build-and-push:
    name: Build Docker → Push ECR
    runs-on: ubuntu-latest

    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          echo "Building image: $IMAGE_URI"
          docker build -t "$IMAGE_URI" .

          echo "Pushing image to ECR..."
          docker push "$IMAGE_URI"

          # Also tag as latest for easy reference
          docker tag "$IMAGE_URI" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

          echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "✅ Image pushed: $IMAGE_URI"

  # ── Job 2: Trigger App Runner deployment ───────────────────
  deploy:
    name: Deploy to App Runner
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Start App Runner deployment
        run: |
          echo "Starting App Runner deployment..."
          aws apprunner start-deployment \
            --service-arn "$APPRUNNER_SERVICE_ARN"
          echo "✅ Deployment started"

      - name: Wait for deployment to complete
        run: |
          echo "Waiting for App Runner service to be RUNNING..."
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$APPRUNNER_SERVICE_ARN" \
              --query 'Service.Status' \
              --output text)
            echo "  Attempt $i/30 — Status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "✅ App Runner deployment complete!"
              exit 0
            fi
            sleep 20
          done
          echo "⚠️ Timeout waiting for RUNNING status (check console)"
          exit 1
