version: 1.0

# ============================================================
# App Runner — Source Code Mode (python311 runtime)
# CRITICAL: Each YAML line = separate Docker RUN instruction
#   → env vars DON'T persist across lines
#   → Must combine export + command with &&
# ============================================================

runtime: python311

build:
  commands:
    pre-build:
      # Python venv inside /app → survives build→runtime copy
      - python3 -m venv /app/venv
      - /app/venv/bin/pip install --no-cache-dir -r vnstock/requirements.txt
      - /app/venv/bin/pip install --no-cache-dir -r dexter/src/investment_advisor/python/requirements.txt

      # Bun — MUST combine export+curl in ONE line (env lost between RUN layers)
      - export BUN_INSTALL="/app/.bun" && curl -fsSL https://bun.sh/install | bash

    build:
      # Bun install dexter deps
      - cd dexter && /app/.bun/bin/bun install

      # Playwright — MUST set env in same line
      - export PLAYWRIGHT_BROWSERS_PATH="/app/.playwright" && cd dexter && /app/.bun/bin/bunx playwright install chromium

      - chmod +x start.sh

run:
  command: bash start.sh

  network:
    port: 3000
    env: DEXTER_SERVER_PORT

  env:
    - name: VNSTOCK_API_URL
      value: http://localhost:8050
    - name: DEXTER_SERVER_PORT
      value: "3000"
    - name: DEXTER_ADVISORY_PYTHON_BIN
      value: /app/venv/bin/python3
    - name: PLAYWRIGHT_BROWSERS_PATH
      value: /app/.playwright
    - name: BEDROCK_AWS_REGION
      value: us-east-1
    - name: DEXTER_ADVISORY_PROVIDER_TIMEOUT_MS
      value: "10000"
    - name: DEXTER_ADVISORY_TIMEOUT_BUDGET_MS
      value: "35000"
    - name: DEXTER_ADVISORY_PROVIDER_RETRIES
      value: "1"
    - name: DEXTER_ADVISORY_MAX_SYMBOLS
      value: "4"
    - name: DEXTER_ADVISORY_GEMINI_NLG_ENABLED
      value: "true"
    - name: DEXTER_ADVISORY_GEMINI_NLG_MODEL
      value: "bedrock:us.anthropic.claude-sonnet-4-20250514-v1:0"
    - name: DEXTER_ADVISORY_DEFAULT_SYMBOLS
      value: "VCB,VIC,HPG,VNM,FPT,ACB,TCB,MBB,GAS,MSN"