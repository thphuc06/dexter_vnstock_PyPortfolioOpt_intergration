version: 1.0

# ============================================================
# App Runner — Source Code Mode (python311 runtime)
# KEY FIX: install everything under /app so it survives
# the build-stage → packaging-stage copy
# ============================================================

runtime: python311

build:
  commands:
    pre-build:
      # Python venv INSIDE /app → gets copied to runtime stage
      - echo "=== Installing Python deps into /app/venv ==="
      - python3 -m venv /app/venv
      - /app/venv/bin/pip install --no-cache-dir -r vnstock/requirements.txt
      - /app/venv/bin/pip install --no-cache-dir -r dexter/src/investment_advisor/python/requirements.txt

      # Bun INSIDE /app → gets copied to runtime stage
      - echo "=== Installing Bun into /app/.bun ==="
      - export BUN_INSTALL="/app/.bun"
      - curl -fsSL https://bun.sh/install | bash

    build:
      - echo "=== Installing Dexter dependencies ==="
      - cd dexter && /app/.bun/bin/bun install

      # Playwright browsers INSIDE /app → gets copied to runtime stage
      - echo "=== Installing Playwright Chromium into /app/.playwright ==="
      - export PLAYWRIGHT_BROWSERS_PATH="/app/.playwright"
      - cd dexter && /app/.bun/bin/bunx playwright install chromium

      - chmod +x start.sh

run:
  command: bash start.sh

  network:
    port: 3000
    env: DEXTER_SERVER_PORT

  env:
    - name: VNSTOCK_API_URL
      value: http://localhost:8050

    - name: DEXTER_SERVER_PORT
      value: "3000"

    # Use venv Python (not system Python)
    - name: DEXTER_ADVISORY_PYTHON_BIN
      value: /app/venv/bin/python3

    # Playwright browsers path matches install path above
    - name: PLAYWRIGHT_BROWSERS_PATH
      value: /app/.playwright

    # Advisory settings
    - name: DEXTER_ADVISORY_PROVIDER_TIMEOUT_MS
      value: "10000"
    - name: DEXTER_ADVISORY_TIMEOUT_BUDGET_MS
      value: "35000"
    - name: DEXTER_ADVISORY_PROVIDER_RETRIES
      value: "1"
    - name: DEXTER_ADVISORY_MAX_SYMBOLS
      value: "4"
    - name: DEXTER_ADVISORY_GEMINI_NLG_ENABLED
      value: "true"
    - name: DEXTER_ADVISORY_GEMINI_NLG_MODEL
      value: gemini-2.0-flash

# ============================================================
# Add via App Runner Console → Environment variables:
# GOOGLE_API_KEY, FINANCIAL_DATASETS_API_KEY, etc.
# ============================================================
