version: 1.0

# ============================================================
# App Runner — Source Code Mode
# App Runner tự build từ GitHub, không cần Docker/ECR
# ============================================================
# Flow: git push main → App Runner detect → build → deploy
# ============================================================

runtime: python311

build:
  commands:
    pre-build:
      # Python + pip3 có sẵn trong python311 runtime
      - echo "=== Installing Python dependencies ==="
      - pip3 install -r vnstock/requirements.txt
      - pip3 install -r dexter/src/investment_advisor/python/requirements.txt

      # Cài Bun (không có sẵn trong python311 runtime)
      - echo "=== Installing Bun ==="
      - curl -fsSL https://bun.sh/install | bash
      - export PATH="/root/.bun/bin:$HOME/.bun/bin:$PATH"

    build:
      - echo "=== Installing Dexter dependencies ==="
      - export PATH="/root/.bun/bin:$HOME/.bun/bin:$PATH"
      - cd dexter && /root/.bun/bin/bun install

      # Playwright Chromium (bỏ --with-deps vì managed runtime dùng yum không phải apt)
      - echo "=== Installing Playwright Chromium ==="
      - cd dexter && /root/.bun/bin/bunx playwright install chromium

      # Make startup script executable
      - chmod +x start.sh


run:
  # start.sh: khởi VNStock ở nền, sau đó khởi Dexter ở foreground
  command: bash start.sh

  network:
    port: 3000
    env: DEXTER_SERVER_PORT

  env:
    # VNStock chạy cùng container, giao tiếp qua localhost
    - name: VNSTOCK_API_URL
      value: http://localhost:8050

    - name: DEXTER_SERVER_PORT
      value: "3000"

    # Python binary trong managed runtime
    - name: DEXTER_ADVISORY_PYTHON_BIN
      value: python3

    # Advisory tool settings
    - name: DEXTER_ADVISORY_PROVIDER_TIMEOUT_MS
      value: "10000"
    - name: DEXTER_ADVISORY_TIMEOUT_BUDGET_MS
      value: "35000"
    - name: DEXTER_ADVISORY_PROVIDER_RETRIES
      value: "1"
    - name: DEXTER_ADVISORY_MAX_SYMBOLS
      value: "4"
    - name: DEXTER_ADVISORY_GEMINI_NLG_ENABLED
      value: "true"
    - name: DEXTER_ADVISORY_GEMINI_NLG_MODEL
      value: gemini-2.0-flash

# ============================================================
# Secrets — set qua App Runner Console (KHÔNG để ở đây):
# ============================================================
# GOOGLE_API_KEY
# OPENAI_API_KEY (optional)
# ANTHROPIC_API_KEY (optional)
# FINANCIAL_DATASETS_API_KEY
# EXASEARCH_API_KEY (optional)
# TAVILY_API_KEY (optional)
# LANGSMITH_API_KEY (optional)
# ============================================================
